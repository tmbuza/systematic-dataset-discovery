project:
  type: book
  output-dir: docs

bibliography: library/references.bib
date: last-modified
date-format: "MMM YYYY"

book:
  title: "CDI Systematic Dataset Discovery"
  subtitle: "From Research Questions to Eligible Public Omics Studies"

  chapters:
    - index.qmd
    - 00-preface-and-overview.qmd
    - 01-why-dataset-discovery-matters.qmd
    - 02-research-questions-and-objectives.qmd
    - 03-data-sources-and-repositories.qmd
    - 04-search-strategy-development.qmd
    - 05-eligibility-criteria.qmd
    - 06-dataset-screening.qmd
    - 07-study-prioritization.qmd
    - 08-included-study-assembly.qmd
    - 09-case-study-healthy-human-gut-microbiome.qmd

    - part: "Reference"
      chapters:
        - 999-references.qmd

format:
  html:
    toc: true
    toc-depth: 3
    number-sections: false
    number-depth: 2
    smooth-scroll: true
    anchor-sections: true
    link-external-icon: true
    css: assets/css/cdi.css
    code-fold: true
    mermaid:
      theme: forest

execute:
  echo: true
  warning: false
  message: false
  freeze: auto
  working-dir: .

